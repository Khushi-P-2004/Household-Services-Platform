{% extends "base.html"%} <title>admin_dashboard</title>

{% block body%}
<form method="POST" action="{{url_for('edit_profile')}}">
  <div class="form-group">
    <label for="username">Username</label>
    <input
      type="text"
      id="username"
      name="username"
      class="form-control"
      value="{{ user.username }}"
      required
    />
  </div>
  <div class="form-group">
    <label for="phone">Phone Number</label>
    <input
      type="text"
      id="phone"
      name="phone"
      class="form-control"
      value="{{ user.phone }}"
      required
    />
  </div>
  <div class="form-group">
    <label for="address">Address</label>
    <input
      type="text"
      id="address"
      name="address"
      class="form-control"
      value="{{ user.address }}"
      required
    />
  </div>
  <input type="submit" value="Save" class="btn btn-success" />
</form>

{% endblock %}
