{% extends "base.html" %} <title>Customer Login</title> {% block body%}
<section>
  <div class="container mt-5 pt-5">
    <div class="row">
      <div class="col-12 col-sm-8 col-md-6 m-auto">
        <div class="card border-0 shadow">
          <div class="card-body p-4">
            <div class="text-center mt-3">
              {% if error %}
              <p>{{error}}</p>
              {% endif %}
            </div>
            <div
              class="d-flex justify-content-center align-items-center"
              style="min-height: 100px"
            >
              <svg
                class="mx-auto"
                xmlns="http://www.w3.org/2000/svg"
                width="40"
                height="50"
                fill="currentColor"
                viewBox="0 0 16 16"
              >
                <path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0" />
                <path
                  fill-rule="evenodd"
                  d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8m8-7a7 7 0 0 0-5.468 11.37C3.242 11.226 4.805 10 8 10s4.757 1.225 5.468 2.37A7 7 0 0 0 8 1"
                />
              </svg>
            </div>

            <form id="a" action="{{url_for('login')}}" method="post">
              <input
                type="text"
                name="username"
                placeholder="Username"
                class="form-control my-4 py-2"
              />
              <input
                type="password"
                name="password"
                placeholder="Password"
                class="form-control my-4 py-2"
              />
              <div class="text-center mt-3">
                <input type="submit" value="Login" class="btn btn-primary" />
                <a href="{{ url_for('newaccount') }}" class="nav-link"
                  >Don't have an account?</a
                >
                <div class="text-center mt-3">
              
                  <a href="{{ url_for('register') }}" class="nav-link"
                    >Register as Professional</a
                  >
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

{% endblock %}
