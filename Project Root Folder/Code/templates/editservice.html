{% extends "base.html"%} <title>add</title>

{% block body%}
<h2>Edit Service</h2>
<form
  method="post"
  class="form"
  action="{{ url_for('edit_service', id=service.id)}}"
>
  <label for="name"
    >Name:
    <input
      type="text"
      name="name"
      id="name"
      class="form-control"
      required
      value="{{service.name}}"
  /></label>
  <label for="price"
    >Price:
    <input
      type="number"
      name="price"
      id="price"
      class="form-control"
      required
      value="{{service.price}}"
  /></label>
  <label for="name"
    >Professional_id:
    <input
      type="text"
      name="prof_id"
      id="prof_id"
      class="form-control"
      required
      value="{{service.prof_id}}"
  /></label>
  <input type="submit" value="Save" class="btn btn-success" />
</form>
<style>
  h2 {
    text-align: center;
  }
  .form {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
</style>

{% endblock %}
